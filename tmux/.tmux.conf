set-option -g prefix C-b
# set-option -g prefix2 C-Space # Disabled to allow C-Space for quick pane navigation without prefix conflict

# Core Behavior
# Increase scrollback history
set-option -g history-limit 50000
# vi-mode for status line and copy-mode
set -g status-keys vi
setw -g mode-keys vi


# Neovim & Terminal Settings
# Faster neovim responsiveness
set-option -sg escape-time 0
set-option -g focus-events on
set-option -g default-terminal "tmux-256color"
set-option -as terminal-overrides ",xterm-256color:RGB"
set-option -g word-separators " "

# Keybindings: Panes & Windows
# Toggle to last window by double-tapping Prefix or Prefix2
bind-key C-b last-window
bind-key C-Space last-window

# Split panes: s (vertical), b (horizontal)
bind s split-window -v -c "#{pane_current_path}"
bind b split-window -h -c "#{pane_current_path}"
# Default split keys (" and %) are also active

# Open new window, retaining current path
bind c new-window -c "#{pane_current_path}"

bind v copy-mode
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down


# Keybindings: Copy Mode & Clipboard
# Search up: Prefix + /
bind-key / copy-mode \; send-key ?

# Begin selection (vi-style)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Yank to system clipboard (Wayland/X11 aware)
if-shell 'test "$XDG_SESSION_TYPE" = "wayland"' \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Copy on double click (vi-mode word selection)
# Note: uses xclip by default; you can use the if-shell logic if you prefer double-click in Wayland
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; run-shell -d 0.15 \; send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.15 \; send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Appearance
set-option -g status-style fg=white,bg=black
set-option -g status-right ""

# Custom Binds
# Stabilize reverse shell
bind g send-keys "python -c \"import pty;pty.spawn('/bin/bash');\"" C-m

# Detect if Vim or FZF is active in the pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|n?vim?x?)(diff)?$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\S+\/)?fzf$'"

# Smart pane switching with Ctrl-hjkl (respecting Vim/FZF)
bind -n C-h run "($is_vim && tmux send-keys C-h) || \
                          tmux select-pane -L"
bind -n C-j run "($is_vim && tmux send-keys C-j)  || \
                         ($is_fzf && tmux send-keys C-j) || \
                         tmux select-pane -D"
bind -n C-k run "($is_vim && tmux send-keys C-k) || \
                          ($is_fzf && tmux send-keys C-k)  || \
                          tmux select-pane -U"
bind -n C-l run  "($is_vim && tmux send-keys C-l) || \
                          tmux select-pane -R"

# Smart pane switching for C-\\ and C-Space (respecting Vim)
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

# Pane navigation in copy-mode
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
